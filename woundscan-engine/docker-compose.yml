services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: woundscan
      POSTGRES_PASSWORD: woundscan
      POSTGRES_DB: woundscan
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U woundscan"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    environment:
      WS_DB_HOST: postgres
      WS_DB_USER: woundscan
      WS_DB_PASSWORD: woundscan
      WS_DB_DATABASE: woundscan
      WS_CELERY_BROKER: redis://redis:6379/0
      WS_CELERY_BACKEND: redis://redis:6379/1
      WS_JWT_SIGNING_KEY: dev-only-do-not-use-in-prod
      WS_ALLOW_DEV_LOGIN: "1"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    command: ["woundscan-worker"]
    environment:
      WS_DB_HOST: postgres
      WS_DB_USER: woundscan
      WS_DB_PASSWORD: woundscan
      WS_DB_DATABASE: woundscan
      WS_CELERY_BROKER: redis://redis:6379/0
      WS_CELERY_BACKEND: redis://redis:6379/1
      WS_JWT_SIGNING_KEY: dev-only-do-not-use-in-prod
      WS_ALLOW_DEV_LOGIN: "1"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
