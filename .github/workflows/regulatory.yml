name: regulatory

on:
  pull_request:
    paths:
      - "woundscan-engine/**"

jobs:
  traceability-coverage:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: woundscan-engine
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - name: Traceability check
        run: python scripts/check_traceability.py
      - name: Run regulatory tests
        run: pytest -q -m regulatory --tb=short
