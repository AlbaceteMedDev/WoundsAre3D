name: web-ci

on:
  push:
    branches: ["main", "claude/*"]
    paths:
      - "woundscan-web/**"
      - ".github/workflows/web-ci.yml"
  pull_request:
    paths:
      - "woundscan-web/**"

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: woundscan-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: woundscan-web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test --if-present
      - run: npm run build
