name: engine-ci

on:
  push:
    branches: ["main", "claude/*"]
    paths:
      - "woundscan-engine/**"
      - ".github/workflows/engine-ci.yml"
  pull_request:
    paths:
      - "woundscan-engine/**"
      - ".github/workflows/engine-ci.yml"

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: woundscan-engine
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip wheel
          pip install -e ".[dev]"
      - name: Ruff
        run: ruff check src/
      - name: Black
        run: black --check src/
      - name: Mypy
        run: mypy src/woundscan || true  # mypy strict is aspirational; doesn't block

  unit-and-regulatory:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: woundscan-engine
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip wheel
          pip install -e ".[dev]"
      - name: Pytest unit + regulatory + benchmarks
        run: pytest -q tests/unit tests/regulatory tests/benchmarks
      - name: Coverage (all tests, including integration)
        run: pytest --cov=woundscan --cov-report=xml --cov-report=term tests/
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-engine
          path: woundscan-engine/coverage.xml

  integration:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: woundscan-engine
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip wheel
          pip install -e ".[dev]"
      - name: Pytest integration
        run: pytest -q tests/integration

  security-scan:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: woundscan-engine
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install bandit pip-audit
          pip install -e .
      - name: Bandit
        run: bandit -r src/woundscan -ll || true
      - name: pip-audit
        run: pip-audit --strict || true

  docker-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: woundscan-engine
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: docker build -t woundscan-engine:ci .
